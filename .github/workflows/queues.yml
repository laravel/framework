name: queues

on:
  push:
    branches:
      - master
      - '*.x'
  pull_request:

jobs:
  sync:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: true

    name: Sync Driver

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, :php-psr
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Set Framework version
        run: composer config version "13.x-dev"

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Execute tests
        run: vendor/bin/phpunit tests/Integration/Queue
        env:
          QUEUE_CONNECTION: sync

  database:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: true

    name: Database Driver

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, :php-psr
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Set Framework version
        run: composer config version "13.x-dev"

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --prefer-stable --prefer-dist --no-interaction --no-progress

      - name: Setup SQLite Database
        run: php vendor/bin/testbench package:create-sqlite-db

      - name: Execute tests
        run: vendor/bin/phpunit tests/Integration/Queue
        env:
          DB_CONNECTION: sqlite
          QUEUE_CONNECTION: database

  beanstalkd:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: true
      matrix:
        include:
          - php: 8.3
            pheanstalk: 7
          - php: 8.4
            pheanstalk: 8

    name: Beanstalkd Driver (pda/pheanstalk:^${{ matrix.pheanstalk }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache beanstalkd binary
        id: cache-beanstalkd
        uses: actions/cache@v4
        with:
          path: beanstalkd-1.13/beanstalkd
          key: beanstalkd-1.13

      - name: Download & Extract beanstalkd
        if: steps.cache-beanstalkd.outputs.cache-hit != 'true'
        run: curl -L https://github.com/beanstalkd/beanstalkd/archive/refs/tags/v1.13.tar.gz | tar xz

      - name: Make beanstalkd
        if: steps.cache-beanstalkd.outputs.cache-hit != 'true'
        run: make
        working-directory: beanstalkd-1.13

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, :php-psr
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Set Framework version
        run: composer config version "13.x-dev"

      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --prefer-stable --prefer-dist --no-interaction --no-progress --with="pda/pheanstalk:^${{ matrix.pheanstalk }}"

      - name: Daemonize beanstalkd
        run: ./beanstalkd-1.13/beanstalkd &

      - name: Execute tests
        run: vendor/bin/phpunit tests/Integration/Queue
        env:
          QUEUE_CONNECTION: beanstalkd
